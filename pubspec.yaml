name: form_validator_x
description: >-
  A flexible and composable form validation library for Flutter.
  Define reusable validation rules (email, date, numeric, pattern, and more)
  and chain them on any TextFormField with zero external dependencies.
version: 0.0.1
homepage: https://github.com/BogneStanley/form_validator_x
repository: https://github.com/BogneStanley/form_validator_x
issue_tracker: https://github.com/BogneStanley/form_validator_x/issues
documentation: https://github.com/BogneStanley/form_validator_x#readme

topics:
  - form
  - validation
  - flutter
  - validator
  - input

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
